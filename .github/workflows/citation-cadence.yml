name: citation-cadence

# spec-v85 §6.3 / spec-v90 §4: warn-only monthly citation-cadence job. It reads
# our own docs/citation-staleness.md ledger and annotates the run when a
# calendar-tracked Class-B row is overdue for a re-verification. It never blocks
# (the script always exits 0) and never auto-edits -- a guideline update is
# always a reviewed, audited maintainer change (spec-v85 §6.4).

on:
  schedule:
    # Monthly, 1st of the month, 07:00 UTC.
    - cron: '0 7 1 * *'
  workflow_dispatch: {}

jobs:
  cadence:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
      - name: Check citation cadence (warn-only)
        run: node scripts/check-citation-cadence.mjs
